services:
  app:
    build: .
    container_name: gaialynk-phase0-app
    environment:
      PORT: 3000
      DATABASE_URL: postgres://gaialynk:gaialynk@postgres:5432/gaialynk
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: gaialynk-phase0-postgres
    environment:
      POSTGRES_USER: gaialynk
      POSTGRES_PASSWORD: gaialynk
      POSTGRES_DB: gaialynk
    ports:
      - "5432:5432"
    volumes:
      - gaialynk_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gaialynk-phase0-redis
    ports:
      - "6379:6379"
    volumes:
      - gaialynk_redis_data:/data

volumes:
  gaialynk_postgres_data:
  gaialynk_redis_data:
